    <script>
// ============ БЕЗОПАСНАЯ РАБОТА С LOCALSTORAGE ============
(function() {
    let storageAvailable = false;
    try {
        const test = 'mega_test';
        localStorage.setItem(test, '1');
        localStorage.removeItem(test);
        storageAvailable = true;
    } catch (e) {
        console.warn('localStorage недоступен, используем память');
    }
    if (!storageAvailable) {
        const memory = {};
        window.localStorage = {
            getItem: (key) => memory[key] || null,
            setItem: (key, val) => { memory[key] = String(val); },
            removeItem: (key) => { delete memory[key]; }
        };
    }
})();

// ============ НАСТРОЙКИ ============
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzUXbhswuM1CbrSebqS9RftGXM9E7NbqDra1-c_tnKLAykcMOrRdRZ6Jep42aXN3d6V/exec";
const MSG_PRICE = 0.01;
const CALL_PRICE_PER_SEC = 0.01;

let currentUser = null;
let currentPassword = null;
let balance = 0;
let contacts = [];
let chatPartner = null;
let messagesCache = [];
let allUsers = {};
let onlineUsers = {};
let favorites = [];

// ============ WebRTC ============
let localStream = null;
let remoteStream = null;
let peerConnection = null;
let callActive = false;
let callTimer = null;
let callStartTime = null;
let incomingCallFrom = null;
let isMuted = false;
let isSpeakerOn = false;
let callMinimized = false;
let connectionMessageSent = false;

// ============ ВСПОМОГАТЕЛЬНЫЕ ============
function showToast(text) {
    const t = document.getElementById('toast');
    if (!t) return;
    t.textContent = text;
    t.classList.add('show');
    clearTimeout(t._hide);
    t._hide = setTimeout(() => t.classList.remove('show'), 3000);
}

function formatTime(iso) {
    if (!iso) return '';
    try {
        const d = new Date(iso);
        return d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
    } catch (e) { return ''; }
}

function formatDuration(seconds) {
    const m = String(Math.floor(seconds / 60)).padStart(2, '0');
    const s = String(seconds % 60).padStart(2, '0');
    return `${m}:${s}`;
}

// ============ API ЗАПРОСЫ ============
async function apiCall(action, params = {}) {
    try {
        const url = new URL(SCRIPT_URL);
        url.searchParams.set('action', action);
        for (const [k, v] of Object.entries(params)) {
            if (v !== undefined && v !== null) url.searchParams.set(k, v);
        }
        const res = await fetch(url.toString(), { mode: 'cors' });
        return await res.json();
    } catch (e) {
        console.error('API Error:', e);
        return { success: false, error: e.message };
    }
}

// ============ ЗАГРУЗКА ПОЛЬЗОВАТЕЛЕЙ ============
async function loadUsers() {
    try {
        const data = await apiCall('getUsers');
        if (data.success) {
            allUsers = data.users || {};
            for (const login in allUsers) {
                onlineUsers[login] = true;
            }
            return allUsers;
        }
    } catch (e) { console.error('loadUsers error:', e); }
    return {};
}

// ============ КОНТАКТЫ ============
async function loadContactsFromSheet() {
    if (!currentUser) return;
    try {
        const data = await apiCall('getFriends', { userId: currentUser });
        if (data.success) {
            contacts = data.friends || [];
            const favData = await apiCall('getFavorites', { userId: currentUser });
            if (favData.success) {
                favorites = favData.favorites || [];
            }
            renderContacts();
            renderChats();
        }
    } catch (e) { console.error('loadContacts error:', e); contacts = []; }
}

async function saveContactsToSheet() {
    if (!currentUser) return;
    try {
        await apiCall('setFriends', { userId: currentUser, friends: JSON.stringify(contacts) });
    } catch (e) { console.error('saveContacts error:', e); }
}

async function saveFavoritesToSheet() {
    if (!currentUser) return;
    try {
        await apiCall('setFavorites', { userId: currentUser, favorites: JSON.stringify(favorites) });
    } catch (e) { console.error('saveFavorites error:', e); }
}

// ============ ВХОД ============
async function doLogin() {
    const login = document.getElementById('loginInput').value.trim();
    const pass = document.getElementById('passwordInput').value.trim();
    if (!login || !pass) { showToast("❌ Введите логин и пароль"); return; }

    try {
        const users = await loadUsers();
        const user = users[login];
        if (!user) { showToast("❌ Пользователь не найден"); return; }
        if (user.password !== pass) { showToast("❌ Неверный пароль"); return; }

        currentUser = login;
        currentPassword = pass;
        balance = user.balance || 0;

        document.getElementById('loginContainer').style.display = 'none';
        document.getElementById('mainContainer').style.display = 'flex';
        document.getElementById('profileLogin').textContent = currentUser;
        updateBalanceDisplay();

        await apiCall('resetCall', { userId: currentUser });
        await loadContactsFromSheet();

        if (window._megaInterval) clearInterval(window._megaInterval);
        window._megaInterval = setInterval(() => {
            refreshAll();
        }, 5000);

        showToast(`🔱 Добро пожаловать, ${currentUser}`);
        switchTab('chats');
    } catch (e) {
        console.error('Login error:', e);
        showToast("❌ Ошибка входа: " + e.message);
    }
}

function doLogout() {
    currentUser = null;
    currentPassword = null;
    document.getElementById('mainContainer').style.display = 'none';
    document.getElementById('loginContainer').style.display = 'flex';
    if (window._megaInterval) clearInterval(window._megaInterval);
    if (window._chatInterval) clearInterval(window._chatInterval);
    if (callActive) endCall();
    showToast("👋 До встречи!");
}

// ============ БАЛАНС ============
async function updateBalance() {
    try {
        const data = await apiCall('getBalance', { userId: currentUser });
        if (data.success) {
            balance = data.balance || 0;
            updateBalanceDisplay();
        }
    } catch (e) {}
}

function updateBalanceDisplay() {
    const b = Math.round(balance * 100) / 100;
    document.getElementById('balanceDisplay').textContent = `💰 ${b} АМД`;
    document.getElementById('profileBalance').textContent = `${b} АМД`;
}

// ============ КОНТАКТЫ ============
function addFriend() {
    const input = document.getElementById('friendInput');
    let name = input.value.trim();
    if (!name) { showToast("❌ Введите @nickname"); return; }
    if (name.startsWith('@')) name = name.substring(1);
    if (name === currentUser) { showToast("❌ Нельзя добавить себя"); return; }
    if (!allUsers[name]) { showToast("❌ Пользователь не найден"); return; }
    if (contacts.includes(name)) { showToast("❌ Уже в контактах"); return; }
    contacts.push(name);
    saveContactsToSheet();
    input.value = '';
    showToast(`✅ ${name} добавлен в контакты`);
    renderChats();
    renderContacts();
}

function removeFriend(name) {
    contacts = contacts.filter(c => c !== name);
    favorites = favorites.filter(f => f !== name);
    saveContactsToSheet();
    saveFavoritesToSheet();
    renderChats();
    renderContacts();
}

function toggleFavorite(name) {
    const idx = favorites.indexOf(name);
    if (idx > -1) {
        favorites.splice(idx, 1);
    } else {
        favorites.push(name);
    }
    saveFavoritesToSheet();
    renderChats();
}

function renderContacts() {
    const container = document.getElementById('contactsList');
    if (!container) return;
    if (contacts.length === 0) {
        container.innerHTML = '<div class="empty-state">👤 Нет контактов. Добавьте друзей!</div>';
        return;
    }
    container.innerHTML = '';
    contacts.forEach(name => {
        const div = document.createElement('div');
        div.className = 'contact-item';
        div.innerHTML = `
            <div class="avatar">${name[0].toUpperCase()}</div>
            <div style="flex:1;">@${name}</div>
            <button onclick="openChatWith('${name}')" style="background:#f7931a; border:none; padding:6px 14px; border-radius:60px; cursor:pointer; font-weight:bold;">💬</button>
            <button onclick="removeFriend('${name}')" style="background:transparent; border:none; color:#ff6666; font-size:18px; cursor:pointer; margin-left:6px;">✕</button>
        `;
        container.appendChild(div);
    });
}

// ============ ЧАТЫ ============
function renderChats() {
    const container = document.getElementById('chatsList');
    if (!container) return;
    if (contacts.length === 0) {
        container.innerHTML = '<div class="empty-state">💬 Нет чатов. Добавьте контакты!</div>';
        return;
    }
    const sorted = [...contacts].sort((a, b) => {
        const aFav = favorites.includes(a) ? 1 : 0;
        const bFav = favorites.includes(b) ? 1 : 0;
        return bFav - aFav;
    });
    container.innerHTML = '';
    let favSection = false;
    sorted.forEach(name => {
        if (!favorites.includes(name) && !favSection) {
            favSection = true;
            const sep = document.createElement('div');
            sep.className = 'fav-section-title';
            sep.textContent = '— ДРУГИЕ ЧАТЫ —';
            container.appendChild(sep);
        }
        const div = document.createElement('div');
        div.className = 'chat-item';
        const isFav = favorites.includes(name);
        div.innerHTML = `
            <div class="avatar">${name[0].toUpperCase()}</div>
            <div class="info">
                <div class="name">@${name}</div>
                <div class="last-msg">Нажмите для чата</div>
            </div>
            <span class="fav-star ${isFav ? 'active' : ''}" onclick="event.stopPropagation(); toggleFavorite('${name}')">⭐</span>
            <div class="time">${onlineUsers[name] ? '🟢' : '⚪'}</div>
        `;
        div.onclick = () => openChatWith(name);
        container.appendChild(div);
    });
}

// ============ ОТКРЫТЬ/ЗАКРЫТЬ ЧАТ ============
function openChatWith(name) {
    if (!contacts.includes(name)) { showToast("❌ Этот пользователь не в контактах"); return; }
    chatPartner = name;
    document.getElementById('chatPartnerName').textContent = `@${name}`;
    const statusEl = document.getElementById('chatPartnerStatus');
    if (onlineUsers[name]) {
        statusEl.className = 'online-status online';
    } else {
        statusEl.className = 'online-status offline';
    }
    document.getElementById('chatWindow').classList.add('active');
    document.getElementById('chatMessages').innerHTML = '';
    loadChatMessages();
    if (window._chatInterval) clearInterval(window._chatInterval);
    window._chatInterval = setInterval(loadChatMessages, 3000);
}

function closeChat() {
    document.getElementById('chatWindow').classList.remove('active');
    chatPartner = null;
    if (window._chatInterval) clearInterval(window._chatInterval);
    if (callActive) minimizeCall();
}

// ============ СООБЩЕНИЯ ============
async function loadChatMessages() {
    if (!chatPartner) return;
    try {
        const data = await apiCall('getMessages', { userId: currentUser });
        if (!data.success) return;
        const all = data.messages || [];
        const dialog = all.filter(m =>
            (m.from === currentUser && m.to === chatPartner) ||
            (m.from === chatPartner && m.to === currentUser) ||
            (m.from === "system" && (m.to === chatPartner || m.to === currentUser))
        );
        if (JSON.stringify(dialog) === JSON.stringify(messagesCache)) return;
        messagesCache = dialog;

        const container = document.getElementById('chatMessages');
        container.innerHTML = '';
        if (dialog.length === 0) {
            container.innerHTML = '<div class="empty-state" style="padding:20px;">💬 Нет сообщений</div>';
            return;
        }
        const sorted = [...dialog].reverse();
        sorted.forEach(msg => {
            const div = document.createElement('div');
            const isOwn = msg.from === currentUser;
            const isSystem = msg.from === "system" || msg.system === "true";
            if (isSystem) {
                div.className = 'msg system';
                div.innerHTML = `${msg.message || ''} <span class="time">${formatTime(msg.timestamp)}</span>`;
            } else {
                div.className = `msg ${isOwn ? 'sent' : 'received'}`;
                div.innerHTML = `${msg.message || ''}<span class="time">${formatTime(msg.timestamp)}</span>`;
            }
            container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
    } catch (e) {}
}

async function sendChatMessage() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) { showToast("✏️ Напишите сообщение"); return; }
    if (!chatPartner) { showToast("❌ Нет собеседника"); return; }
    if (balance < MSG_PRICE) { showToast(`❌ Недостаточно АМД. Нужно ${MSG_PRICE} АМД`); return; }

    input.value = '';

    try {
        const spend = await apiCall('spendAmd', { userId: currentUser, amount: MSG_PRICE });
        if (!spend.success) { showToast("❌ " + (spend.error || "Ошибка списания")); return; }
        balance = spend.newBalance || 0;
        updateBalanceDisplay();

        await apiCall('sendMessage', {
            userId: currentUser,
            toUser: chatPartner,
            message: text
        });

        await loadChatMessages();
        showToast("✅ Сообщение отправлено");
    } catch (e) {
        showToast("❌ Ошибка: " + e.message);
    }
}

// ============ WebRTC (ГОЛОС) ============
async function startWebrtcCall(isCaller) {
    try {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        
        peerConnection = new RTCPeerConnection({
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        });

        localStream.getTracks().forEach(track => {
            peerConnection.addTrack(track, localStream);
        });

        peerConnection.ontrack = (event) => {
            remoteStream = event.streams[0];
            const audio = new Audio();
            audio.srcObject = remoteStream;
            audio.play();
            showToast("🔊 Аудио-связь установлена");
        };

        peerConnection.oniceconnectionstatechange = () => {
            if (peerConnection.iceConnectionState === 'disconnected' || 
                peerConnection.iceConnectionState === 'failed') {
                endCall();
            }
        };

        if (isCaller) {
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            await apiCall('webrtcOffer', {
                userId: currentUser,
                toUser: chatPartner,
                sdp: JSON.stringify(offer)
            });
            await waitForAnswer();
        } else {
            // Получаем offer
            const offerRes = await apiCall('getWebrtcOffer', { userId: currentUser });
            if (offerRes.success && offerRes.offer) {
                const offer = JSON.parse(offerRes.offer);
                await peerConnection.setRemoteDescription(offer);
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                await apiCall('webrtcAnswer', {
                    userId: currentUser,
                    toUser: offerRes.from,
                    sdp: JSON.stringify(answer)
                });
                showToast("✅ Аудио-канал установлен");
            }
        }
    } catch (e) {
        showToast("❌ Ошибка микрофона: " + e.message);
        endCall();
    }
}

async function waitForAnswer() {
    let attempts = 0;
    const interval = setInterval(async () => {
        attempts++;
        const res = await apiCall('getWebrtcAnswer', { userId: currentUser });
        if (res.success && res.answer) {
            clearInterval(interval);
            const answer = JSON.parse(res.answer);
            await peerConnection.setRemoteDescription(answer);
            showToast("✅ Аудио-канал установлен");
        }
        if (attempts > 30) {
            clearInterval(interval);
            if (!callActive) endCall();
        }
    }, 2000);
}

// ============ ЗВОНКИ ============
async function checkIncomingCall() {
    if (!currentUser) return;
    try {
        const res = await apiCall('callStatus', { userId: currentUser });
        if (res.success && res.status === "ringing" && res.from !== currentUser) {
            incomingCallFrom = res.from;
            document.getElementById('incomingCallOverlay').classList.add('active');
            document.getElementById('incomingAvatar').textContent = incomingCallFrom[0].toUpperCase();
            document.getElementById('incomingName').textContent = `@${incomingCallFrom}`;
            showToast(`📞 Входящий звонок от @${incomingCallFrom}`);
        }
    } catch (e) {}
}

async function acceptIncomingCall() {
    if (!incomingCallFrom) { showToast("❌ Нет входящего звонка"); return; }
    try {
        const res = await apiCall('callAnswer', {
            userId: currentUser,
            toUser: incomingCallFrom
        });
        if (res.success) {
            document.getElementById('incomingCallOverlay').classList.remove('active');
            chatPartner = incomingCallFrom;
            callActive = true;
            callStartTime = Date.now();
            connectionMessageSent = false;
            
            // Запускаем WebRTC
            await startWebrtcCall(false);
            
            // Показываем меню звонка
            showCallUI(chatPartner);
            document.getElementById('callStatus').textContent = '✅ Соединено';
            document.getElementById('callDuration').classList.add('visible');
            
            // Запускаем биллинг
            startCallBilling();
            
            // Отправляем системное сообщение
            if (!connectionMessageSent) {
                connectionMessageSent = true;
                await sendSystemMessage(`📞 Звонок от @${currentUser} (ответил)`);
            }
            
            incomingCallFrom = null;
        }
    } catch (e) {
        showToast("❌ Ошибка: " + e.message);
    }
}

async function rejectIncomingCall() {
    if (!incomingCallFrom) return;
    document.getElementById('incomingCallOverlay').classList.remove('active');
    await apiCall('callEnd', { userId: currentUser, toUser: incomingCallFrom });
    await sendSystemMessage(`📵 Звонок от @${incomingCallFrom} (отклонён)`);
    incomingCallFrom = null;
    showToast("📵 Звонок отклонён");
}

function showCallUI(name) {
    document.getElementById('callOverlay').classList.add('active');
    document.getElementById('callAvatar').textContent = name[0].toUpperCase();
    document.getElementById('callName').textContent = `@${name}`;
    document.getElementById('callStatus').textContent = '⏳ Соединение...';
    document.getElementById('callDuration').classList.remove('visible');
    document.getElementById('callBtn').style.display = 'none';
    document.getElementById('endCallBtn').style.display = 'inline-block';
    document.getElementById('callMini').classList.remove('active');
    callMinimized = false;
}

function hideCallUI() {
    document.getElementById('callOverlay').classList.remove('active');
    document.getElementById('callMini').classList.remove('active');
    document.getElementById('callBtn').style.display = 'inline-block';
    document.getElementById('endCallBtn').style.display = 'none';
    document.getElementById('answerCallBtn').style.display = 'none';
    callMinimized = false;
}

function minimizeCall() {
    if (!callActive) return;
    document.getElementById('callOverlay').classList.remove('active');
    document.getElementById('callMini').classList.add('active');
    document.getElementById('miniAvatar').textContent = chatPartner ? chatPartner[0].toUpperCase() : '👤';
    document.getElementById('miniName').textContent = chatPartner ? `@${chatPartner}` : 'Звонок';
    callMinimized = true;
}

function maximizeCall() {
    if (!callActive) return;
    document.getElementById('callMini').classList.remove('active');
    document.getElementById('callOverlay').classList.add('active');
    callMinimized = false;
    updateCallUI();
}

function updateCallUI() {
    if (!callActive || !callStartTime) return;
    const duration = Math.floor((Date.now() - callStartTime) / 1000);
    document.getElementById('callDuration').textContent = formatDuration(duration);
    document.getElementById('miniDuration').textContent = formatDuration(duration);
}

function toggleMic() {
    isMuted = !isMuted;
    const btn = document.getElementById('micBtn');
    btn.textContent = isMuted ? '🚫' : '🎤';
    btn.classList.toggle('muted', isMuted);
    if (localStream) {
        localStream.getTracks().forEach(track => {
            track.enabled = !isMuted;
        });
    }
    showToast(isMuted ? '🔇 Микрофон выключен' : '🎤 Микрофон включён');
}

function toggleSpeaker() {
    isSpeakerOn = !isSpeakerOn;
    const btn = document.getElementById('speakerBtn');
    btn.textContent = isSpeakerOn ? '🔊' : '🔉';
    btn.classList.toggle('active', isSpeakerOn);
    showToast(isSpeakerOn ? '🔊 Громкая связь включена' : '🔉 Громкая связь выключена');
}

function startCallBilling() {
    if (callTimer) clearInterval(callTimer);
    callStartTime = Date.now();
    callActive = true;
    document.getElementById('endCallBtn').style.display = 'inline-block';
    document.getElementById('callBtn').style.display = 'none';

    callTimer = setInterval(async () => {
        if (!callActive) {
            clearInterval(callTimer);
            return;
        }
        const seconds = Math.floor((Date.now() - callStartTime) / 1000);
        if (seconds % 10 === 0 && seconds > 0) {
            await spendAmdForCall(10);
        }
        updateCallUI();
    }, 1000);
}

async function startCall() {
    if (!chatPartner) { showToast("❌ Нет собеседника"); return; }
    if (balance < 1) { showToast("❌ Недостаточно АМД для звонка"); return; }
    if (callActive) { showToast("⏳ Уже в звонке"); return; }

    try {
        const statusRes = await apiCall('callStatus', { userId: chatPartner });
        if (statusRes.status === "ringing") {
            showToast("⚠️ Собеседник уже в звонке");
            return;
        }

        const res = await apiCall('call', { userId: currentUser, toUser: chatPartner });
        if (!res.success) { showToast("❌ " + res.error); return; }

        callActive = true;
        callStartTime = Date.now();
        connectionMessageSent = false;
        showCallUI(chatPartner);
        document.getElementById('callStatus').textContent = '⏳ Ожидание ответа...';
        showToast(`📞 Звоним @${chatPartner}...`);

        // Запускаем WebRTC как caller
        await startWebrtcCall(true);

        // Проверяем статус звонка
        let attempts = 0;
        const checkInterval = setInterval(async () => {
            attempts++;
            const status = await apiCall('callStatus', { userId: currentUser });
            if (status.success && status.status === "answered") {
                clearInterval(checkInterval);
                document.getElementById('callStatus').textContent = '✅ Соединено';
                document.getElementById('callDuration').classList.add('visible');
                if (!connectionMessageSent) {
                    connectionMessageSent = true;
                    await sendSystemMessage(`📞 Звонок от @${currentUser} (ответил)`);
                }
                startCallBilling();
                showToast(`✅ Звонок начался с @${chatPartner}`);
            }
            if (attempts > 50) {
                clearInterval(checkInterval);
                if (!callActive) {
                    await endCall();
                    showToast("⏰ Звонок не отвечен");
                }
            }
        }, 3000);
    } catch (e) {
        showToast("❌ Ошибка: " + e.message);
    }
}

async function answerCall() {
    // Перенаправляем на глобальный оверлей
    await acceptIncomingCall();
}

async function endCall() {
    if (!callActive && !incomingCallFrom) {
        await resetCall();
        return;
    }

    if (callActive && chatPartner) {
        const duration = Math.floor((Date.now() - callStartTime) / 1000);
        await apiCall('callEnd', { userId: currentUser, toUser: chatPartner });
        await sendSystemMessage(`⏹️ Звонок завершён (${duration} сек)`);
        showToast(`⏹️ Звонок завершён (${duration} сек)`);
    }

    // Закрываем WebRTC
    if (peerConnection) {
        peerConnection.close();
        peerConnection = null;
    }
    if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
        localStream = null;
    }
    if (remoteStream) {
        remoteStream.getTracks().forEach(track => track.stop());
        remoteStream = null;
    }

    callActive = false;
    connectionMessageSent = false;
    document.getElementById('endCallBtn').style.display = 'none';
    document.getElementById('callBtn').style.display = 'inline-block';
    document.getElementById('answerCallBtn').style.display = 'none';
    document.getElementById('incomingCallOverlay').classList.remove('active');
    if (callTimer) clearInterval(callTimer);
    callStartTime = null;
    incomingCallFrom = null;
    callTimer = null;
    hideCallUI();
}

async function spendAmdForCall(seconds) {
    const cost = CALL_PRICE_PER_SEC * seconds;
    const res = await apiCall('spendAmd', { userId: currentUser, amount: cost });
    if (res.success) {
        balance = res.newBalance || 0;
        updateBalanceDisplay();
        showToast(`💸 Списано ${cost.toFixed(2)} АМД за звонок`);
    } else {
        showToast("❌ " + (res.error || "Ошибка списания"));
        await endCall();
    }
}

async function resetCall() {
    if (!chatPartner && !currentUser) { showToast("❌ Нет собеседника"); return; }
    try {
        const res = await apiCall('resetCall', {
            userId: currentUser,
            toUser: chatPartner || ''
        });
        if (res.success) {
            showToast("✅ Статус звонка сброшен");
            callActive = false;
            connectionMessageSent = false;
            document.getElementById('endCallBtn').style.display = 'none';
            document.getElementById('callBtn').style.display = 'inline-block';
            document.getElementById('answerCallBtn').style.display = 'none';
            document.getElementById('incomingCallOverlay').classList.remove('active');
            if (callTimer) clearInterval(callTimer);
            callStartTime = null;
            incomingCallFrom = null;
            hideCallUI();
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
        }
    } catch (e) {
        showToast("❌ Ошибка: " + e.message);
    }
}

async function sendSystemMessage(text) {
    await apiCall('addSystemMessage', {
        from: "system",
        to: chatPartner,
        text: text
    });
    await loadChatMessages();
}

// ============ ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК ============
function switchTab(tab) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    const content = document.getElementById(`tab-${tab}`);
    if (content) content.classList.add('active');
    const btn = document.querySelector(`.tab-btn[data-tab="${tab}"]`);
    if (btn) btn.classList.add('active');
    if (tab === 'chats') renderChats();
    if (tab === 'contacts') renderContacts();
    if (tab === 'profile') updateBalance();
}

document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        switchTab(btn.dataset.tab);
    });
});

// ============ ОБНОВЛЕНИЕ ============
async function refreshAll() {
    await updateBalance();
    await checkIncomingCall();
    if (chatPartner) await loadChatMessages();
    if (callActive) updateCallUI();
}

            <div class="call-controls">
                <button class="mic" id="micBtn" onclick="toggleMic()">🎤</button>
                <button class="speaker" id="speakerBtn" onclick="toggleSpeaker()">🔊</button>
                <button class="back-chat" onclick="minimizeCall()">💬</button>
                <button class="hangup" onclick="endCall()">📞</button>
            </div>
        </div>

        <!-- ===== МИНИ-ПАНЕЛЬ ЗВОНКА ===== -->
        <div id="callMini" class="call-mini" onclick="maximizeCall()">
            <div class="mini-avatar" id="miniAvatar">👤</div>
            <span id="miniName">Пользователь</span>
            <span class="mini-duration" id="miniDuration">00:00</span>
            <button class="mini-hangup" onclick="event.stopPropagation(); endCall()">✕</button>
        </div>
    </div>
</div>
